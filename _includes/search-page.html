{% include packages-assign.html %}

<section class="package">
    <section class="package-content">
        <h1>{{ page.title | default: "Search" }}</h1>

        <div class="package-main">
            <p>
                <span id="search-process">Loading</span>
                results <span id="search-query-container" style="display: none;">
                for "<strong id="search-query"></strong>"</span>
            </p>
        </div>

        <div id="package-list"></div>
    </section>

    <section class="sidebar sticky">
        <div>
            <strong>Package list</strong>
        </div>
        <div>
            {% include keywords-navigation.html %}
        </div>
    </section>
</section>

<script>
    window.baseurl = "{{ site.baseurl }}";
    window.data = {
    {% assign _search_added = false %}
    {% for package in packages %}
    {% if package.title %}
    {% unless package.excluded_in_search %}
    {% if _search_added %},{% endif %}
    "{{ package.url | slugify }}": {
        "id":         "{{ package.url | slugify }}",
        "title":      {{ package.title | xml_escape | jsonify }},
        "categories": {{ package.categories | join: ", " | xml_escape | jsonify }},
        "url":        "{{ package.url | xml_escape }}",
        "content":    {{ package.content | strip_html | replace: "\n", " " | replace: "  ", " " | strip | jsonify }}
    }
    {% assign _search_added = true %}
    {% endunless %}
    {% endif %}
    {% endfor %}
    };
</script>
<script src="{{ site.baseurl }}/assets/js/lunr.min.js"></script>
<script src="{{ site.baseurl }}/assets/js/search.js"></script>
