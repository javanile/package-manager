
{% if site.logo %}
	<img src="{{ site.logo }}" alt="{% if site.logo_text %}{{ site.logo_text }}{% else %}{% include site-title.html %}{% endif %}" />
{% elsif site.logo_text %}
	{{ site.logo_text }}
{% else %}
	<img src="{{ site.baseurl }}/assets/images/logo.png" alt="{% include site-title.html %}" />
{% endif %}
