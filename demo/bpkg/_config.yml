---

name: bpkg
title: bpkg
description: Easily install and manage bash packages. Like npm, but for bash scripts.
url: https://bpkg.sh

repository: bpkg/bpkg

primary_color: "#2d2d2d"
secondary_color: "#EEE"

plugins:
  - jekyll-remote-theme

remote_theme: javanile/package-manager@main

footer_links:
  - name: GitHub
    link: https://github.com/bpkg/bpkg
    social_icon: GitHub
    new_window: true

collections:
  packages:
    output: true
    permalink: /:collection/:name
  categories:
    output: true
    permalink: /:collection/:name

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "index.html"
    values:
      body_class: "show_hero_search"
