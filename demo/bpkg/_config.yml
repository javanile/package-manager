---

name: bpkg
title: BPKG
tagline: Lightweight Shell Package Manager
description: Easily install and manage bash packages. Like npm, but for bash scripts.
url: https://bpkg.sh

repository: bpkg/bpkg

suggested_command: "bpkg install {package}"

primary_color: "#2d2d2d"
secondary_color: "#EEE"

exclude:
  - bpkg.github.io/

plugins:
  - jekyll-remote-theme

remote_theme: javanile/package-manager@main

footer_links:
  - name: GitHub
    link: https://github.com/bpkg/bpkg
    social_icon: GitHub
    new_window: true

collections:
  packages:
    output: true
    permalink: /:collection/:name
  categories:
    output: true
    permalink: /:collection/:name

navigation:
  - name: Get Started
    link: /packages/
  - name: Packages
    link: /packages/
  - name: Contribute
    link: https://github.com/bpkg/bpkg/blob/main/CONTRIBUTING.md

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "index.html"
    values:
      body_class: "show_hero_search"
  - scope:
      type: "categories"
    values:
      body_class: "page-packages"
