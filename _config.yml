---

name: package-manager
title: Package Manager
tagline: I'm the demo of a package manager website
url: https://javanile.org/package-manager/
baseurl:
logo: https://raw.githubusercontent.com/javanile/package-manager/main/assets/images/logo.png
repository: javanile/package-manager
enable_dark_theme: true
default_package_language: shell
default_package_format: source

alert:
  type: info
  title: 🎉 Happy News!
  message: The new website is out :-) <a href="https://google.com">Google</a>

disqus_shortname:
google_analytics_key:
newsletter_action:

# Values for the jekyll-seo-tag gem (https://github.com/jekyll/jekyll-seo-tag)
description: Knowledge base template for Jekyll.
author:
  name:
  email:
  twitter: # twitter username without the @ symbol
social:
  name: Base Template
  links:
    - https://github.com/Javanile/base-jekyll-template

brand_font_url: "https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
brand_font_family: "'Ubuntu Mono', consolas, monaco, monospaced"
#primary_color: "#000"
#secondary_color: "#EEE"
#dark_theme_primary_color: "#111"
#dark_theme_secondary_color: "#1e1e1e"

# -----
# Build

timezone: Etc/UTC

permalink: /:categories/:title/

plugins:
  #- jekyll-extract-element
  #- jekyll-sitemap
  #- jekyll-seo-tag
  - jekyll-feed
  #- jekyll-archives

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENCE
  - vendor/*
  - packages/*


defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      type: "posts"
    values:
      layout: "post"
      comments: true
  -
    scope:
      type: "sets"
    values:
      _hide_content: true
  -
    scope:
      path: "index.html"
    values:
      body_class: "show_hero_search"
  -
    scope:
      type: "categories"
    values:
      body_class: "page-packages"

# -----------
# Javanile

social_icons:
  - Facebook
  - Google Plus
  - Instagram
  - LinkedIn
  - Pinterest
  - Tumblr
  - Twitter
  - YouTube
  - Email
  - RSS

types:
  - Document
  - Video

_comments:

theme: null

footer_links:
  - name:
    link: https://facebook.com/Javanile
    social_icon: Facebook
    new_window: true
  - name:
    link: https://twitter.com/Javanile
    social_icon: Twitter
    new_window: true
  - name:
    link: https://youtube.com/c/Javanile
    social_icon: YouTube
    new_window: true
  - name:
    link: https://instagram.com/
    social_icon: Instagram
    new_window: true

collections:
  packages:
    output: true
    permalink: /:collection/:name
  categories:
    output: true
    permalink: /:collection/:name

jekyll-archives:
  enabled:
    - categories
    - tags
  permalinks:
    category: /cat/:name/

sass:
  silence_deprecations:
    - import
    - global-builtin

markdown: kramdown
kramdown:
  input: GFM
