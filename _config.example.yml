
title: Package Manager
remote_theme: javanile/package-manager@main

# ──────────────────────────────────────────────────────────────────────────────
# Navigation
# By default the topnav shows: Get Started, Packages, Contribute.
# Define `navigation` to replace those defaults with custom links.
# Each item requires `name` (label) and `link` (URL).
# Supports absolute URLs, root-relative paths, and anchor links.
#
# navigation:
#   - name: Home
#     link: /
#   - name: Packages
#     link: /packages/
#   - name: Docs
#     link: /docs/
#   - name: GitHub
#     link: https://github.com/your-org/your-repo
# ──────────────────────────────────────────────────────────────────────────────

logo: https://raw.githubusercontent.com/javanile/package-manager/main/assets/images/logo.png
primary_color: "#000"
secondary_color: "#EEE"
dark_theme_primary_color: "#111"
dark_theme_secondary_color: "#1e1e1e"
enable_dark_theme: true
#
# Optional brand font used by the hero title on the homepage.
# Useful when the chosen family only renders correctly with a specific weight.
# brand_font_url: "https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap"
# brand_font_family: "'IBM Plex Mono', monospace"
# brand_font_weight: 700
# brand_font_style: normal

alert:
  type: info
  title: 🎉 Happy News!
  message: The new website is out :-) <a href="https://google.com">Google</a>

disqus_shortname:
google_analytics_key:
newsletter_action:

timezone: Etc/UTC

permalink: /:categories/:title/

plugins:
  - jekyll-extract-element
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-archives

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENCE
  - vendor/*
  - packages/*

defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      type: "posts"
    values:
      layout: "post"
      comments: true
  -
    scope:
      type: "sets"
    values:
      _hide_content: true
  -
    scope:
      path: "index.html"
    values:
      body_class: "show_hero_search"

social_icons:
  - Facebook
  - Google Plus
  - Instagram
  - LinkedIn
  - Pinterest
  - Tumblr
  - Twitter
  - YouTube
  - Email
  - RSS

types:
  - Document
  - Video

_comments:

theme: null

footer_links:
  - name:
    link: https://facebook.com/Javanile
    social_icon: Facebook
    new_window: true
  - name:
    link: https://twitter.com/Javanile
    social_icon: Twitter
    new_window: true
  - name:
    link: https://youtube.com/c/Javanile
    social_icon: YouTube
    new_window: true
  - name:
    link: https://instagram.com/
    social_icon: Instagram
    new_window: true

collections:
  packages:
    output: true
    permalink: /:collection/:name
  categories:
    output: true
    permalink: /:collection/:name

jekyll-archives:
  enabled:
    - categories
    - tags
  permalinks:
    category: /cat/:name/
